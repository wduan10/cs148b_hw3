# §4 — RESISC45 fine-tuning. Used for full FT, LoRA, and linear probe runs.
# `--method` is set on the command line; this config provides shared settings.

num_classes: 45

optim:
  lr: 1.0e-4
  weight_decay: 0.01
  betas: [0.9, 0.999]
  warmup_steps: 100
  scheduler: cosine

train:
  batch_size: 128
  num_epochs: 10
  num_workers: 4
  log_every: 25
  eval_every_epoch: 1

# Per-method overrides.
methods:
  linear_probe:
    lr: 1.0e-3
  lora:
    lr: 1.0e-4
  full_ft:
    lr: 5.0e-5
